# Alembic configuration for gg-relay.
#
# The DB URL is intentionally left blank — production sets it via
# ``RELAY_DATABASE_URL`` (read by env.py); local dev defaults to
# ``sqlite+aiosqlite:///./relay.db``.

[alembic]
script_location = src/gg_relay/store/migrations
sqlalchemy.url =
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
