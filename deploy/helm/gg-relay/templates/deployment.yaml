apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gg-relay.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gg-relay.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "gg-relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gg-relay.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gg-relay.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: migrate
          image: {{ include "gg-relay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["gg-relay"]
          args: ["migrate"]
          env:
            - name: RELAY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gg-relay.secretName" . }}
                  key: RELAY_DATABASE_URL
            - name: RELAY_LOG_JSON
              value: "true"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.initContainerResources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: relay
          image: {{ include "gg-relay.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["gg-relay"]
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gg-relay.configMapName" . }}
            - secretRef:
                name: {{ include "gg-relay.secretName" . }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ include "gg-relay.name" . }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Release.Namespace }}"
            - name: GG_RELAY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: claude-metrics
              mountPath: /home/relay/.claude/metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    set -e
                    curl -fsS -X POST \
                      -H "X-API-Key: $(echo $RELAY_API_KEYS | sed -E 's/.*"admin":"([^"]+)".*/\1/')" \
                      http://127.0.0.1:8000/api/v1/admin/drain || true
                    sleep {{ .Values.preStopDrainSleepSeconds }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: claude-metrics
          emptyDir:
            sizeLimit: 256Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
