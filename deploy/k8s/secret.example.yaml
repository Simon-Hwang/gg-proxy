# Plan 9 D9.4 — Secret TEMPLATE. DO NOT commit a populated
# version of this file. Production deployments should use
# SealedSecrets, External Secrets Operator, or a similar managed
# flow rather than literal `kubectl create secret`.
#
# The keys here are the ONLY required ones for a multi-worker
# rollout; everything else lives in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: gg-relay-secrets
  namespace: gg
  labels:
    app: gg-relay
type: Opaque
stringData:
  # Plan 5 — Postgres connection string. Use a dedicated DB user
  # with only SELECT/INSERT/UPDATE/DELETE on the gg-relay schema
  # (no DDL); the InitContainer migrate uses a separate user with
  # DDL grants.
  RELAY_DATABASE_URL: "postgresql+asyncpg://gg_relay:CHANGEME@postgres:5432/gg_relay"
  # Plan 9 D9.1/D9.2 — use rediss:// (TLS) for production.
  RELAY_REDIS_URL: "redis://redis:6379/0"
  # Plan 8 — dashboard SessionMiddleware cookie signing key.
  # Rotating this invalidates every dashboard login (operators
  # must announce maintenance windows before rotating).
  RELAY_DASHBOARD_SESSION_SECRET: "CHANGEME-32-bytes-base64-or-random-hex"
  # Plan 8 D8.29 — bootstrap admin API key (CLI rotation is
  # available via `gg-relay key rotate`).
  RELAY_API_KEYS: '{"admin":"CHANGEME-admin-api-key","ops":"CHANGEME-ops-api-key"}'
