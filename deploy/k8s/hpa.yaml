# Plan 9 D9.4 — HorizontalPodAutoscaler driven by
# ``gg_relay_sessions_active`` (Plan 7 D7.21 gauge), not CPU.
#
# Sessions-per-pod is the right scale signal because each
# Claude Code session pins one async slot for its lifetime; CPU
# is mostly idle while waiting on Anthropic. The
# ``stabilizationWindowSeconds: 300`` matches R9.3 (HPA thrash
# protection); scale-up is more aggressive (60s) because
# falling behind on a queue of pending sessions is more painful
# than over-provisioning.
#
# Requires Prometheus Adapter (or KEDA) to expose the
# `gg_relay_sessions_active` series as a custom metric on the
# `pods` resource. Operators without an adapter can change
# `metrics:` to the CPU fallback shown in the commented block.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gg-relay
  namespace: gg
  labels:
    app: gg-relay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gg-relay
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Pods
      pods:
        metric:
          name: gg_relay_sessions_active
        target:
          type: AverageValue
          averageValue: "10"
    # Fallback (uncomment if Prometheus Adapter is not installed):
    # - type: Resource
    #   resource:
    #     name: cpu
    #     target:
    #       type: Utilization
    #       averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
