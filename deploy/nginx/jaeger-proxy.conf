# Plan 6 D6.14 — nginx reverse proxy that fronts both gg-relay AND the
# Jaeger UI under a single origin. The dashboard's span-tree iframe
# (`templates/span_tree.html`) embeds `{jaeger_ui_url}/trace/{trace_id}`;
# unless that URL is **same-origin** with the dashboard, modern browsers
# enforce `X-Frame-Options: DENY` on Jaeger's responses and refuse to
# render the iframe. Routing the Jaeger UI through this server block
# fixes the embed by:
#
#   1. Strip outgoing `X-Frame-Options` and CSP headers Jaeger sets
#      so the iframe is allowed to render in the dashboard origin.
#   2. Keep all other paths (dashboard, /api/v1/*, /metrics, SSE) on
#      the gg-relay upstream, preserving WebSocket / event-stream
#      semantics for the Kanban SSE feed.
#
# Operator setup:
#   * Set RELAY_JAEGER_UI_URL=/jaeger in the gg-relay env so the iframe
#     `src` resolves through this nginx instance.
#   * Make sure the Jaeger UI is reachable as `jaeger:16686` from the
#     nginx container (compose `services:` example below).
#   * For TLS, terminate at this nginx and point the upstreams at HTTP
#     internally — the gg-relay service intentionally doesn't speak TLS
#     (Plan 4 §8 / docs/security.md "TLS termination" section).
#
# Compose snippet (fragment of deploy/docker-compose.prod.yml):
#
#   nginx:
#     image: nginx:1.25-alpine
#     volumes:
#       - ./nginx/jaeger-proxy.conf:/etc/nginx/conf.d/default.conf:ro
#     ports:
#       - "443:443"
#     depends_on: [gg-relay, jaeger]
#     networks: [gg-relay]

upstream gg_relay_upstream {
    # gg-relay-service container exposes :8000 on the gg-relay network.
    # Plan 4 §8 — TLS terminates at this nginx, never inside the app.
    server gg-relay:8000;
    keepalive 16;
}

upstream jaeger_upstream {
    # Jaeger UI v1.x default — point at port 16686.
    server jaeger:16686;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    # ── Jaeger UI proxy ──────────────────────────────────────────────
    # Same-origin path so the dashboard iframe doesn't trip
    # X-Frame-Options. The proxy_hide_header directives drop the two
    # response headers Jaeger sets that would block the embed.
    location /jaeger/ {
        proxy_pass http://jaeger_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # D6.14 — required for the iframe embed.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        # Jaeger UI's static assets work well with this buffer size.
        proxy_buffering off;
    }

    # ── Server-Sent Events (Kanban + per-session events) ─────────────
    # Disable buffering so the SSE chunks flush to the browser without
    # the default `proxy_buffering on` 8KB delay; the gg-relay route
    # also sends `X-Accel-Buffering: no` as a belt-and-braces hint.
    location ~ ^/(dashboard/kanban/stream|api/v1/sessions/[^/]+/events)$ {
        proxy_pass http://gg_relay_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # ── Default: gg-relay upstream ───────────────────────────────────
    location / {
        proxy_pass http://gg_relay_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
