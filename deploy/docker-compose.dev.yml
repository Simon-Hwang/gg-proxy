# Development compose (Plan 5 D5.6=A).
#
# DEV ONLY: this file mounts the host Docker socket into the service
# container so DockerExecutor can spawn per-session runner containers.
# That is a high-trust posture (see docs/security.md → "Docker socket
# exposure"). Production deployments MUST use
# docker-compose.prod.yml, which leaves socket management to the host
# sysadmin and does NOT bind-mount the socket.
#
# Usage:
#     docker compose -f deploy/docker-compose.dev.yml up --build
#
# Optional: expose Postgres / OTel collector by uncommenting their blocks
# below.

services:
  gg-relay:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
    image: gg-relay-service:dev
    container_name: gg-relay
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      RELAY_DATABASE_URL: "sqlite+aiosqlite:///./data/relay.db"
      RELAY_INSTALL_DIR_ROOT: "/var/lib/gg-relay/installs"
      RELAY_DOCKER_SOCKET_ROOT: "/var/run/gg-relay"
      RELAY_TASK_TRACE_PATH: "/var/log/gg-relay/gg-task-trace.jsonl"
      # Plan 7 D7.11 — point OTel exporter at the sibling jaeger
      # all-in-one service. ``setup_tracer`` reads this in priority
      # over ``OTEL_EXPORTER_OTLP_ENDPOINT``; see docs/tracing.md.
      RELAY_OTEL_ENDPOINT: "http://jaeger:4317"
    depends_on:
      - jaeger
    ports:
      - "8000:8000"
    volumes:
      # DEV ONLY: mounting the host docker socket grants the container
      # root-equivalent control of the daemon. NEVER do this in prod —
      # see docs/security.md.
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - gg-relay-data:/opt/gg-relay/data
      - gg-relay-installs:/var/lib/gg-relay/installs
      - gg-relay-logs:/var/log/gg-relay
      - gg-relay-sockets:/var/run/gg-relay
    # Allow the non-root ``ggrelay`` user to talk to the host docker
    # socket without weakening permissions on the socket itself.
    group_add:
      - "${DOCKER_GID:-999}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Plan 7 D7.11 — Jaeger all-in-one for local OTel inspection.
  # The all-in-one binary embeds collector + query + UI in a single
  # container; not for production. ``platform: linux/amd64`` is
  # pinned explicitly so arm64 Macs still pull a working image
  # (Jaeger publishes amd64-only tags for all-in-one as of 1.57).
  jaeger:
    image: jaegertracing/all-in-one:1.57
    platform: linux/amd64
    container_name: gg-relay-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC ingest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Uncomment for Postgres in dev:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: gg
  #     POSTGRES_PASSWORD: gg
  #     POSTGRES_DB: gg_relay
  #   ports: ["5432:5432"]
  #   volumes:
  #     - gg-relay-postgres:/var/lib/postgresql/data

  # Uncomment for OTel collector in dev (see deploy/docker/otel-collector.yml):
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.97.0
  #   command: ["--config=/etc/otelcol/config.yml"]
  #   ports: ["4317:4317", "4318:4318"]
  #   volumes:
  #     - ./otel-collector.yml:/etc/otelcol/config.yml:ro

  # ── Plan 8 D8.13 / Task 20 — Prometheus + Grafana observability ─────
  # Both services live under ``profiles: [observability]`` so the
  # default ``docker compose up`` boot stays lightweight. Enable with
  #     docker compose -f deploy/docker-compose.dev.yml \
  #         --profile observability up
  # Grafana ships with an anonymous-admin org for local dev only —
  # never reuse this posture in production.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: gg-relay-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - gg-relay-prometheus:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: gg-relay-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/gg-relay-dashboard.json:/var/lib/grafana/dashboards/gg-relay.json:ro
      - gg-relay-grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Plan 8 D8.3 / Task 20 — one-shot retention prune ───────────────
  # Bound to a separate ``maintenance`` profile so it never runs as
  # part of the default ``up``. Operators invoke it explicitly:
  #     docker compose -f deploy/docker-compose.dev.yml \
  #         --profile maintenance run --rm maintenance
  # In production it should be wired to a cron / systemd timer rather
  # than a long-lived container.
  maintenance:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
    image: gg-relay-service:dev
    profiles: ["maintenance"]
    restart: "no"
    env_file:
      - ../.env
    environment:
      RELAY_DATABASE_URL: "sqlite+aiosqlite:///./data/relay.db"
    volumes:
      - gg-relay-data:/opt/gg-relay/data
    command: ["gg-relay", "maintenance", "--retention-days", "30"]

volumes:
  gg-relay-data:
  gg-relay-installs:
  gg-relay-logs:
  gg-relay-sockets:
  gg-relay-prometheus:
  gg-relay-grafana:
  # gg-relay-postgres:
