name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install gg-relay (with dev extras)
        run: uv sync --frozen --python python${{ matrix.python-version }} --extra dev --extra postgres --extra otel-http --extra feishu
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests
        continue-on-error: true  # Plan 5: lint is canonical; format check
                                  # gates are aspirational until the whole
                                  # tree is mass-reformatted.
      - name: mypy --strict
        run: uv run mypy --strict src/gg_relay
      - name: pytest (no docker)
        env:
          # Disable the JSONL writer in CI — runners are ephemeral so the
          # default path is harmless, but turning it off keeps the test
          # surface minimal.
          RELAY_TASK_TRACE_PATH: none
        run: |
          uv run pytest -q -m "not requires_docker and not requires_api_key and not requires_feishu and not requires_curl" \
            --cov=gg_relay --cov-report=term-missing --cov-fail-under=88
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            .coverage
          if-no-files-found: ignore

  requires-docker:
    name: requires_docker (DockerExecutor)
    runs-on: ubuntu-latest
    needs: test
    # Stand up a real Postgres so the migration-chain / optimistic-
    # locking / pool-tuning tests marked ``@requires_docker`` actually
    # exercise the Postgres dialect instead of skipping. The service
    # name ``postgres`` resolves on the runner's host network; we map
    # the port explicitly so the URL we export below is stable
    # regardless of host scheduler ordering.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gg
          POSTGRES_PASSWORD: gg
          POSTGRES_DB: gg
        ports:
          - 5432:5432
        # Wait for the daemon to actually accept connections before
        # the install step runs migrations against it. Without this
        # healthcheck the first ``asyncpg.connect`` in a test can
        # race the container's startup and yield a flaky run.
        options: >-
          --health-cmd "pg_isready -U gg -d gg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Confirm Docker daemon is reachable
        # GitHub-hosted ubuntu-latest runners ship with a working Docker
        # daemon out of the box — no setup-docker action needed.
        run: |
          docker version
          docker info | grep -i 'Server Version'
      - name: Install gg-relay (with dev extras)
        run: uv sync --frozen --python python3.12 --extra dev --extra postgres
      - name: pytest -m requires_docker
        env:
          RELAY_TASK_TRACE_PATH: none
          # Tests opt into the Postgres-dialect path by reading this
          # env (see tests/integration/test_migrations_chain.py and
          # tests/integration/test_optimistic_locking_postgres.py).
          # The asyncpg dialect is derived inside the helpers, so the
          # plain ``postgresql://`` form is fine here.
          RELAY_TEST_POSTGRES_URL: postgresql://gg:gg@127.0.0.1:5432/gg
        run: |
          # ``--override-ini='addopts='`` cancels pyproject.toml's
          # global ``--cov-fail-under=88`` for this job only. Rationale:
          # this job runs a tiny, hand-picked subset of tests (the
          # ``@requires_docker`` mark; the docker-executor e2e tests
          # additionally need ``@requires_api_key`` and stay skipped
          # without ANTHROPIC_API_KEY in repo secrets), so the global
          # coverage gate that applies to the full pytest suite in the
          # ``test`` matrix above is meaningless here — enforcing it
          # would mean this job can only ever go green if it duplicates
          # the entire suite. Coverage is still measured for diagnostics
          # via ``--cov``/``--cov-report``; just not gated.
          uv run pytest -q -m "requires_docker" \
            --override-ini='addopts=' \
            --cov=gg_relay --cov-report=term-missing
