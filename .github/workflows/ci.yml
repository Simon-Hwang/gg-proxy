name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install gg-relay (with dev extras)
        run: uv sync --frozen --python python${{ matrix.python-version }} --extra dev --extra postgres --extra otel-http --extra feishu
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests
        continue-on-error: true  # Plan 5: lint is canonical; format check
                                  # gates are aspirational until the whole
                                  # tree is mass-reformatted.
      - name: mypy --strict
        run: uv run mypy --strict src/gg_relay
      - name: pytest (no docker)
        env:
          # Disable the JSONL writer in CI — runners are ephemeral so the
          # default path is harmless, but turning it off keeps the test
          # surface minimal.
          RELAY_TASK_TRACE_PATH: none
        run: |
          uv run pytest -q -m "not requires_docker and not requires_api_key and not requires_feishu and not requires_curl" \
            --cov=gg_relay --cov-report=term-missing --cov-fail-under=88
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            .coverage
          if-no-files-found: ignore

  requires-docker:
    name: requires_docker (DockerExecutor)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Confirm Docker daemon is reachable
        # GitHub-hosted ubuntu-latest runners ship with a working Docker
        # daemon out of the box — no setup-docker action needed.
        run: |
          docker version
          docker info | grep -i 'Server Version'
      - name: Install gg-relay (with dev extras)
        run: uv sync --frozen --python python3.12 --extra dev --extra postgres
      - name: pytest -m requires_docker
        env:
          RELAY_TASK_TRACE_PATH: none
        run: |
          uv run pytest -q -m "requires_docker" --cov=gg_relay \
            --cov-report=term-missing --no-cov-on-fail
