name: Release

# Plan 7 Task 3 — tagged-release pipeline (D7.1, D7.6).
#
# Triggers only on tags shaped like ``v0.7.0``. The job performs:
#   1. ``uv sync --frozen --extra dev`` for reproducible installs.
#   2. 3-source version check (pyproject ↔ importlib ↔ tag) so a
#      hand-tagged release can never disagree with the shipped wheel.
#   3. pip-licenses gate: hard-fail on GPL/AGPL direct deps, warn on
#      UNKNOWN. Run via ``uv run --with`` so we don't have to ship
#      pip-licenses as a regular dev dep.
#   4. Build & push ``gg-relay-service`` to GHCR with three tag aliases
#      (``vMAJOR.MINOR.PATCH``, ``MAJOR.MINOR.PATCH``, ``MAJOR.MINOR``)
#      so consumers can pin at any granularity.
#   5. GitHub release with auto-generated notes.
#
# Fork guard: the job no-ops on forks via the ``github.repository``
# equality check, so anyone pushing tags from a fork (a) never publishes
# to the canonical GHCR and (b) doesn't burn release minutes.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release on tag
    runs-on: ubuntu-latest
    # Fork guard — only the canonical repo may publish.
    if: github.repository == 'gg-relay/gg-relay'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install (frozen, dev + redis extras)
        # Plan 9 v0.9.0-rc (D9.0b) — `--extra redis` is required so
        # the built Docker image carries `redis` Python client. v0.9.0
        # ships the [redis] extra capable of opt-in multi-worker mode
        # via RELAY_EVENT_BUS_BACKEND=redis; without this flag the
        # image would silently lack the import and any operator who
        # flipped the config would CrashLoopBackOff at lifespan init.
        run: uv sync --frozen --extra dev --extra redis

      - name: 3-source version check
        run: |
          uv run python scripts/check_version_sync.py "${GITHUB_REF#refs/tags/v}"

      - name: pip-licenses gate (fail GPL/AGPL, warn UNKNOWN)
        run: |
          set -euo pipefail
          DIRECT_PKGS=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(' '.join(p.split(';')[0].split('>')[0].split('=')[0].split('<')[0].split('[')[0].strip() for p in d['project']['dependencies']))")
          uv run --with pip-licenses pip-licenses --format=json --packages $DIRECT_PKGS \
            | uv run python scripts/check_licenses.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag variants
        id: tags
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"   # 0.7.0
          MINOR="${TAG%.*}"                 # 0.7
          {
            echo "v_tag=v$TAG"
            echo "v_tag_bare=$TAG"
            echo "minor=$MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push gg-relay-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.service
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/gg-relay/gg-relay-service:${{ steps.tags.outputs.v_tag }}
            ghcr.io/gg-relay/gg-relay-service:${{ steps.tags.outputs.v_tag_bare }}
            ghcr.io/gg-relay/gg-relay-service:${{ steps.tags.outputs.minor }}
          cache-from: type=gha,scope=gg-relay-service
          cache-to: type=gha,mode=max,scope=gg-relay-service

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
